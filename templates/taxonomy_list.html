{% extends "base.html" %}

{% block head %}
  {% set entries_url = config.base_url ~ "/entries/" %}
  <meta http-equiv="refresh" content="0; url={{ entries_url }}">
{% endblock head %}

{% block content %}
  <section class="section-head">
    <h1>{{ taxonomy.name | capitalize }} moved</h1>
    <p>Structured browsing now lives inside the All Files archive view.</p>
    <a href="{{ entries_url }}">Open all files</a>
  </section>
{% endblock content %}
